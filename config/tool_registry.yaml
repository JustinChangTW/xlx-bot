version: 1
tools:
  - name: knowledge_lookup
    capability: retrieve_club_knowledge
    risk: low
    env_constraints:
      - KNOWLEDGE_FILE
  - name: provider_dispatch
    capability: invoke_llm_provider_chain
    risk: medium
    env_constraints:
      - OLLAMA_API_URL
      - OLLAMA_MODEL_NAME
  - name: webhook_sync
    capability: sync_line_webhook_endpoint
    risk: medium
    env_constraints:
      - LINE_ACCESS_TOKEN
      - LINE_CHANNEL_SECRET
      - PUBLIC_BASE_URL
  - name: answer_response
    capability: return_grounded_answer_to_user
    risk: low
    env_constraints: []
  - name: learning_capture
    capability: record_learning_event_or_user_correction
    risk: low
    env_constraints:
      - MEMORY_DIR
  - name: troubleshooting_capture
    capability: record_error_and_troubleshooting_event
    risk: low
    env_constraints:
      - MEMORY_DIR
  - name: docs_draft
    capability: produce_documentation_draft_for_review
    risk: medium
    env_constraints: []
  - name: sidecar_dispatch
    capability: request_openclaw_sidecar_suggestions
    risk: medium
    env_constraints:
      - SIDECAR_ENABLED
      - OPENCLAW_BASE_URL
  - name: formal_knowledge_write
    capability: write_or_update_formal_knowledge_files
    risk: high
    env_constraints: []
  - name: code_change
    capability: change_runtime_code_or_configuration
    risk: high
    env_constraints: []
  - name: deploy
    capability: deploy_or_modify_runtime_environment
    risk: high
    env_constraints: []
